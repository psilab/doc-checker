<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hut Availability</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>

        body{
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            text-align: center;
        }

        h1{
            margin-bottom: 10px;
        }

        select{
            margin-top: 10px;
            font-size: 16px;
            padding: 6px 12px;
        }

        #calendar{
            margin-top: 20px;
        }

        .available{
            background:#4CAF50 !important;
            color:white !important;
        }

        .low{
            background:#FF9800 !important;
            color:white !important;
        }

        .full{
            background:#F44336 !important;
            color:white !important;
        }

        #info{
            margin-top:20px;
            font-size:18px;
        }

        .legend{
            margin-top:20px;
            display:flex;
            justify-content:center;
            gap:20px;
        }

        .legend div{
            display:flex;
            align-items:center;
            gap:6px;
        }

        .box{
            width:14px;
            height:14px;
            border-radius:3px;
        }

        .green{background:#4CAF50}
        .orange{background:#FF9800}
        .red{background:#F44336}

    </style>
</head>

<body>

<h1>Hut Availability</h1>

<select id="hutSelect"></select>

<div id="calendar"></div>

<div id="info">Click a day to see availability</div>

<div class="legend">
    <div><span class="box green"></span> plenty</div>
    <div><span class="box orange"></span> few left</div>
    <div><span class="box red"></span> full</div>
</div>

<script>

    function localDate(d) {
        return d.getFullYear() + "-" +
            String(d.getMonth() + 1).padStart(2, "0") + "-" +
            String(d.getDate()).padStart(2, "0");
    }

    let fp = null;

    function loadHut(hutId) {
        fetch(`./data/${hutId}.json?t=` + Date.now())
            .then(r => r.json())
            .then(data => {

                const dates = data.Facility.Dates

                const dateMap = {}

                for (const key in dates){
                    const d = dates[key]
                    dateMap[d.Date] = d
                }

                const currentDate = fp ? new Date(fp.currentYear, fp.currentMonth, 1) : null;

                if (fp) fp.destroy();

                fp = flatpickr("#calendar", {

                    inline: true,
                    locale: { firstDayOfWeek: 1 },
                    defaultDate: currentDate || new Date(),

                    onDayCreate: function(dObj, dStr, fp, dayElem){

                        const date = localDate(dayElem.dateObj)

                        const d = dateMap[date]

                        if (!d) return

                        if (!d.IsAvailable){
                            dayElem.classList.add("full")
                        }
                        else if (d.TotalAvailable < 10){
                            dayElem.classList.add("low")
                        }
                        else{
                            dayElem.classList.add("available")
                        }

                    },

                    onChange: function(selectedDates){

                        if (!selectedDates.length) return

                        const date = localDate(selectedDates[0])

                        const d = dateMap[date]

                        if (!d){
                            document.getElementById("info").innerText =
                                "No data for this date"
                            return
                        }

                        document.getElementById("info").innerText =
                            date + " — " + d.TotalAvailable + " places available"

                    }

                })

            })
    }

    fetch("./config.json?t=" + Date.now())
        .then(r => r.json())
        .then(config => {

            const select = document.getElementById("hutSelect")

            for (const hut of config.huts){
                const opt = document.createElement("option")
                opt.value = hut.id
                opt.textContent = hut.name
                select.appendChild(opt)
            }

            select.addEventListener("change", () => {
                document.getElementById("info").innerText = "Click a day to see availability"
                loadHut(select.value)
            })

            if (config.huts.length) loadHut(config.huts[0].id)

        })

</script>

</body>
</html>
