<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hut Availability</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>

        body{
            font-family: Arial, sans-serif;
            max-width: 1600px;
            margin: 40px auto;
            text-align: center;
        }

        h1{
            margin-bottom: 20px;
        }

        .nav{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .nav button{
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 10px;
        }

        .nav button:hover{
            background: #eee;
            border-radius: 4px;
        }

        #navLabel{
            font-size: 18px;
            font-weight: bold;
            min-width: 140px;
        }

        .huts{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
        }

        .hut{
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hut h2{
            margin-bottom: 10px;
        }

        .flatpickr-prev-month,
        .flatpickr-next-month,
        .flatpickr-current-month{
            display: none !important;
        }

        .available{
            background:#4CAF50 !important;
            color:white !important;
        }

        .low{
            background:#FF9800 !important;
            color:white !important;
        }

        .full{
            background:#F44336 !important;
            color:white !important;
        }

        .watched{
            outline: 4px solid #1565C0 !important;
            outline-offset: -4px;
        }

        .legend{
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .legend div{
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .box{
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        .green{background:#4CAF50}
        .orange{background:#FF9800}
        .red{background:#F44336}

    </style>
</head>

<body>

<h1>Hut Availability</h1>

<div class="nav">
    <button id="navPrev">&#8249;</button>
    <div id="navLabel"></div>
    <button id="navNext">&#8250;</button>
</div>

<div class="huts" id="huts"></div>

<div class="legend">
    <div><span class="box green"></span> plenty</div>
    <div><span class="box orange"></span> few left</div>
    <div><span class="box red"></span> full</div>
</div>

<script>

    const instances = [];
    const MONTHS = ["January","February","March","April","May","June",
                    "July","August","September","October","November","December"];

    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();

    function updateLabel() {
        document.getElementById("navLabel").textContent = MONTHS[currentMonth] + " " + currentYear;
    }

    function syncAll() {
        for (const fp of instances) {
            fp.changeYear(currentYear);
            fp.changeMonth(currentMonth, false);
        }
        updateLabel();
    }

    document.getElementById("navPrev").addEventListener("click", () => {
        currentMonth--;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        syncAll();
    });

    document.getElementById("navNext").addEventListener("click", () => {
        currentMonth++;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        syncAll();
    });

    function localDate(d) {
        return d.getFullYear() + "-" +
            String(d.getMonth() + 1).padStart(2, "0") + "-" +
            String(d.getDate()).padStart(2, "0");
    }

    function loadHut(hut, container) {
        fetch(`./data/${hut.id}.json?t=` + Date.now())
            .then(r => r.json())
            .then(data => {

                if (!data?.Facility?.Dates) return;

                const dates = data.Facility.Dates;
                const dateMap = {};

                for (const key in dates){
                    const d = dates[key];
                    dateMap[d.Date] = d;
                }

                const cal = document.createElement("div");
                container.appendChild(cal);

                const fp = flatpickr(cal, {

                    inline: true,
                    locale: { firstDayOfWeek: 1 },
                    defaultDate: new Date(currentYear, currentMonth, 1),

                    onDayCreate: function(dObj, dStr, fp, dayElem){

                        const date = localDate(dayElem.dateObj);
                        const d = dateMap[date];

                        if (d) {
                            if (!d.IsAvailable){
                                dayElem.classList.add("full");
                            } else if (d.TotalAvailable < 10){
                                dayElem.classList.add("low");
                            } else {
                                dayElem.classList.add("available");
                            }
                        }

                        if (hut.watchDates.includes(date)){
                            dayElem.classList.add("watched");
                        }

                    }

                });

                instances.push(fp);

            });
    }

    updateLabel();

    fetch("./config.json?t=" + Date.now())
        .then(r => r.json())
        .then(config => {
            const sorted = [...config.huts].sort((a, b) => a.name.localeCompare(b.name));
            for (const hut of sorted){
                const container = document.createElement("div");
                container.className = "hut";
                const title = document.createElement("h2");
                title.textContent = hut.name;
                container.appendChild(title);
                document.getElementById("huts").appendChild(container);
                loadHut(hut, container);
            }
        });

</script>

</body>
</html>
