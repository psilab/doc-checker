<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hut Availability</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>

        body{
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            text-align: center;
        }

        h1{
            margin-bottom: 30px;
        }

        .huts{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
        }

        .hut{
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hut h2{
            margin-bottom: 10px;
        }

        .available{
            background:#4CAF50 !important;
            color:white !important;
        }

        .low{
            background:#FF9800 !important;
            color:white !important;
        }

        .full{
            background:#F44336 !important;
            color:white !important;
        }

        .info{
            margin-top: 10px;
            font-size: 16px;
            min-height: 24px;
        }

        .legend{
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .legend div{
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .box{
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        .green{background:#4CAF50}
        .orange{background:#FF9800}
        .red{background:#F44336}

    </style>
</head>

<body>

<h1>Hut Availability</h1>

<div class="huts" id="huts"></div>

<div class="legend">
    <div><span class="box green"></span> plenty</div>
    <div><span class="box orange"></span> few left</div>
    <div><span class="box red"></span> full</div>
</div>

<script>

    function localDate(d) {
        return d.getFullYear() + "-" +
            String(d.getMonth() + 1).padStart(2, "0") + "-" +
            String(d.getDate()).padStart(2, "0");
    }

    function loadHut(hut) {
        fetch(`./data/${hut.id}.json?t=` + Date.now())
            .then(r => r.json())
            .then(data => {

                if (!data?.Facility?.Dates) return;

                const dates = data.Facility.Dates;
                const dateMap = {};

                for (const key in dates){
                    const d = dates[key];
                    dateMap[d.Date] = d;
                }

                const container = document.createElement("div");
                container.className = "hut";

                const title = document.createElement("h2");
                title.textContent = hut.name;

                const cal = document.createElement("div");

                const info = document.createElement("div");
                info.className = "info";
                info.textContent = "Click a day to see availability";

                container.appendChild(title);
                container.appendChild(cal);
                container.appendChild(info);
                document.getElementById("huts").appendChild(container);

                flatpickr(cal, {

                    inline: true,
                    locale: { firstDayOfWeek: 1 },

                    onDayCreate: function(dObj, dStr, fp, dayElem){

                        const date = localDate(dayElem.dateObj);
                        const d = dateMap[date];

                        if (!d) return;

                        if (!d.IsAvailable){
                            dayElem.classList.add("full");
                        } else if (d.TotalAvailable < 10){
                            dayElem.classList.add("low");
                        } else {
                            dayElem.classList.add("available");
                        }

                    },

                    onChange: function(selectedDates){

                        if (!selectedDates.length) return;

                        const date = localDate(selectedDates[0]);
                        const d = dateMap[date];

                        info.textContent = d
                            ? date + " — " + d.TotalAvailable + " places available"
                            : "No data for this date";

                    }

                });

            });
    }

    fetch("./config.json?t=" + Date.now())
        .then(r => r.json())
        .then(config => {
            for (const hut of config.huts){
                loadHut(hut);
            }
        });

</script>

</body>
</html>
